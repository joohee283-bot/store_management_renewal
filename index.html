<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매장 정보 | LG전자</title>
    <!-- SheetJS for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">
            <svg width="100" height="32" viewBox="0 0 100 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12.5 4C7.8 4 4 7.8 4 12.5C4 17.2 7.8 21 12.5 21C14.7 21 16.7 20.2 18.2 18.8L18.4 18.6L19.8 20L19.6 20.2C17.7 22 15.2 23 12.5 23C6.7 23 2 18.3 2 12.5C2 6.7 6.7 2 12.5 2C15.2 2 17.7 3 19.6 4.8L19.8 5L18.4 6.4L18.2 6.2C16.7 4.8 14.7 4 12.5 4ZM10 10H15V12H10V10Z"
                    fill="#A50034" />
                <text x="32" y="24" fill="#333" font-family="Pretendard" font-weight="700" font-size="20">LG전자</text>
            </svg>
        </div>
        <div class="nav-icons">
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </span>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">매장 정보</h1>
        <p class="page-desc">매장 점검에 필요한 각 매장의 내역뿐 및 지점별 HSAD 현장대리인 담당자 정보,<br>분기별 패킹 점검 결과 및 사진을 확인할 수 있는 메뉴입니다.</p>

        <div class="search-sort-container">
            <div class="search-bar-underline">
                <input type="text" placeholder="검색어를 입력하세요">
                <span class="search-icon-right">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </span>
            </div>
            <div class="sort-container">
                <button class="sort-btn">정렬
                    <span class="sort-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="4" y1="21" x2="4" y2="14" />
                            <line x1="4" y1="10" x2="4" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="12" />
                            <line x1="12" y1="8" x2="12" y2="3" />
                            <line x1="20" y1="21" x2="20" y2="16" />
                            <line x1="20" y1="12" x2="20" y2="3" />
                            <line x1="2" y1="14" x2="6" y2="14" />
                            <line x1="10" y1="8" x2="14" y2="8" />
                            <line x1="18" y1="16" x2="22" y2="16" />
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <div class="list-controls">
            <div class="total-count">총 <span id="store-total">0</span>건</div>
            <div class="view-toggles">
                <button class="view-toggle active" data-view="card">카드형</button>
                <button class="view-toggle" data-view="list">리스트</button>
                <button class="btn-download-list" id="open-list-download-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    매장 리스트 다운로드
                </button>
            </div>
        </div>

        <div class="filter-section" id="zone-filters">
            <!-- Level 1 row -->
            <div class="zone-level1-row" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
                <button class="filter-btn active" data-level="1" data-filter="all">전체</button>
                <button class="filter-btn" data-level="1" data-filter="매장외부">매장 외부</button>
                <button class="filter-btn" data-level="1" data-filter="제품존">제품존</button>
                <button class="filter-btn" data-level="1" data-filter="연출존">연출존</button>
            </div>
            <!-- Level 2 row -->
            <div class="zone-level2-row" id="zone-level2-row" style="display: none; gap: 0.5rem; flex-wrap: wrap;">
            </div>
        </div>

        <div class="store-grid" id="store-container">
            <!-- Stores will be rendered here by list.js -->
        </div>
    </main>

    <!-- List Download Modal -->
    <div id="list-download-modal" class="modal-overlay">
        <div class="modal-content list-download-content">
            <span class="close-btn" id="close-list-download">&times;</span>
            <h2 style="font-size: 1.3rem; margin-bottom: 1.2rem;">매장 리스트 다운로드</h2>

            <div class="download-filters-container">
                <div class="filter-row-vertical">
                    <div class="filter-group-v">
                        <label>유통</label>
                        <div class="filter-button-group" id="dist-btn-group">
                            <button class="filter-btn-item active" data-value="all">전체</button>
                            <button class="filter-btn-item" data-value="B2B">B2B</button>
                            <button class="filter-btn-item" data-value="기타">기타</button>
                            <button class="filter-btn-item" data-value="전매">전매</button>
                            <button class="filter-btn-item" data-value="혼매">혼매</button>
                        </div>
                    </div>
                    <div class="filter-group-v" style="margin-top: 0.4rem;">
                        <label>채널</label>
                        <div class="filter-button-group" id="channel-btn-group">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                    <div class="filter-group-v" style="margin-top: 0.4rem;">
                        <label>ZONE</label>
                        <!-- Zone Level 1 -->
                        <div class="filter-button-group" id="modal-zone-level1-group" style="margin-bottom: 0.5rem;">
                            <button class="filter-btn-item active" data-zone1="all">전체</button>
                            <button class="filter-btn-item" data-zone1="매장외부">매장 외부</button>
                            <button class="filter-btn-item" data-zone1="제품존">제품존</button>
                            <button class="filter-btn-item" data-zone1="연출존">연출존</button>
                        </div>
                        <!-- Zone Level 2 (shown when a level1 is selected) -->
                        <div id="modal-zone-level2-wrap" style="display: none;">
                            <div class="filter-button-group" id="modal-zone-level2-group">
                                <!-- Injected by JS -->
                            </div>
                            <div class="selected-tags-container" id="zone-tags-container"></div>
                        </div>
                    </div>
                </div>

                <div class="filter-row" style="margin-top: 1.2rem; align-items: flex-end;">
                    <div class="filter-group" style="flex: 1;">
                        <label>최근 점검일</label>
                        <div class="date-range">
                            <input type="date" value="2026-03-03" id="start-date">
                            <span>-</span>
                            <input type="date" value="2026-03-10" id="end-date">
                        </div>
                    </div>
                    <div class="filter-group" style="flex: 1.5; margin-left: 2rem;">
                        <div class="search-modal-group">
                            <input type="text" placeholder="검색어를 입력해주세요" id="modal-search-input">
                            <button class="btn-modal-search" id="modal-search-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="download-results-area">
                <table class="download-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="check-all-stores" checked></th>
                            <th>매장명</th>
                            <th>유통</th>
                            <th>채널</th>
                            <th>주소</th>
                            <th>점검상태</th>
                        </tr>
                    </thead>
                    <tbody id="modal-results-body">
                        <!-- Results injected by JS -->
                    </tbody>
                </table>
            </div>

            <div class="modal-footer-btns">
                <button class="btn-download-excel" id="confirm-list-download-btn">선택 매장 다운로드</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="list.js"></script>
</body>

</html>
