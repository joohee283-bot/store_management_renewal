<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매장 상세 | LG전자</title>
    <link rel="stylesheet" href="style.css">
    <!-- JSZip for ZIP generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .detail-top-btns {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-outline {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border-gray);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .detail-content {
            display: grid;
            grid-template-columns: 480px 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        .left-section {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            padding: 1rem;
        }

        .main-img-container {
            position: relative;
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            overflow: hidden;
        }

        #main-detail-img {
            width: 100%;
            display: block;
        }

        .scene-tabs {
            display: flex;
            border-top: 1px solid var(--border-gray);
        }

        .scene-tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            border-right: 1px solid var(--border-gray);
            background: var(--white);
            color: var(--text-dark);
            font-weight: 500;
        }

        .scene-tab:last-child {
            border-right: none;
        }

        .scene-tab.active {
            background: var(--lg-red);
            color: var(--white);
        }

        .thumb-nav {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .thumb-nav img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .thumb-nav img.active {
            border-color: var(--lg-red);
        }

        .explore-btn {
            margin-top: 1.5rem;
            width: 100%;
            padding: 1rem;
            background: var(--lg-red);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .info-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .info-header {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .info-header h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .store-path {
            color: var(--text-gray);
            font-weight: 400;
            font-size: 1.1rem;
        }

        .info-row {
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }

        .info-label {
            color: var(--text-gray);
            width: 120px;
            display: inline-block;
        }

        .manager-section {
            margin-top: 1rem;
        }

        .manager-title {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        .manager-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .manager-tab {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-gray);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        .manager-tab.active {
            background: var(--lg-red);
            color: var(--white);
            border-color: var(--lg-red);
        }

        .manager-field {
            background: #F7F7F7;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.95rem;
            border: 1px solid #EDEDED;
        }

        .inspection-section {
            background: #F8F9FA;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1rem;
            text-align: center;
        }

        .inspection-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 0.75rem;
        }

        .inspection-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .inspection-item label {
            color: var(--text-gray);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .inspection-item span {
            font-weight: 700;
            font-size: 1.25rem;
        }

        .inspection-item .highlight-red {
            color: var(--lg-red);
        }

        .btn-more {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-gray);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .history-section {
            margin-top: 3rem;
            border-top: 2px solid var(--text-dark);
            padding-top: 2rem;
        }

        .history-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .empty-history {
            text-align: center;
            color: var(--text-gray);
            padding: 4rem 0;
        }

        /* Gallery Grid in Modal */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .gallery-item {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Zoom Navigation Overlay */
        #zoom-modal .modal-content {
            background: transparent;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        #zoom-image {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 8px;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .prev-arrow {
            left: 2rem;
        }

        .download-btn {
            margin-top: 1rem;
            width: 100%;
            padding: 1rem;
            background: var(--white);
            color: var(--lg-red);
            border: 1px solid var(--lg-red);
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .download-btn:hover {
            background: #FFF0F3;
        }

        /* Download Modal (Selection) */
        .download-modal-content {
            width: 400px;
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            position: relative;
        }

        .download-filter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }

        .download-filter-btn {
            padding: 0.75rem;
            border: 1px solid var(--border-gray);
            background: var(--white);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .download-filter-btn.active {
            border-color: var(--lg-red);
            color: var(--lg-red);
            background: #FFF0F3;
        }

        .download-filter-btn .check-circle {
            width: 18px;
            height: 18px;
            border: 1px solid var(--border-gray);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .download-filter-btn.active .check-circle {
            background: var(--lg-red);
            border-color: var(--lg-red);
        }

        .download-filter-btn.active .check-circle::after {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
        }

        .btn-confirm-download {
            width: 100%;
            padding: 1rem;
            background: var(--lg-red);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" style="display: flex; align-items: center; gap: 1rem;">
            <div id="back-btn" style="cursor: pointer; display: flex; align-items: center; color: #333;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </div>
            <div onclick="location.href='index.html'" style="cursor:pointer">
                <svg width="100" height="32" viewBox="0 0 100 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12.5 4C7.8 4 4 7.8 4 12.5C4 17.2 7.8 21 12.5 21C14.7 21 16.7 20.2 18.2 18.8L18.4 18.6L19.8 20L19.6 20.2C17.7 22 15.2 23 12.5 23C6.7 23 2 18.3 2 12.5C2 6.7 6.7 2 12.5 2C15.2 2 17.7 3 19.6 4.8L19.8 5L18.4 6.4L18.2 6.2C16.7 4.8 14.7 4 12.5 4ZM10 10H15V12H10V10Z"
                        fill="#A50034" />
                    <text x="32" y="24" fill="#333" font-family="Pretendard" font-weight="700"
                        font-size="20">LG전자</text>
                </svg>
            </div>
        </div>
        <div class="nav-icons">
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                    <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
            </span>
            <span class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </span>
        </div>
    </header>

    <main class="container">
        <div class="detail-top-btns">
            <button class="btn-outline">매장 문의 확인</button>
            <button class="btn-outline">매장 정보 수정</button>
        </div>

        <div class="detail-content" id="detail-card-layout">
            <!-- Content filled by detail_view.js -->
        </div>

        <div class="history-section">
            <h3 class="history-title">매장 요청 내역</h3>
            <div class="empty-history">
                요청 내역이 존재하지 않습니다.
            </div>
        </div>
    </main>

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="close-gallery">&times;</span>
            <h2 style="margin-bottom: 1.5rem;">ZONE 별 매장 살펴보기</h2>
            <div class="filter-section" id="gallery-filters">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="구독케어존">구독케어존</button>
                <button class="filter-btn" data-filter="집한채">집한채</button>
                <button class="filter-btn" data-filter="M&B">M&B</button>
                <button class="filter-btn" data-filter="냉장고">냉장고</button>
                <button class="filter-btn" data-filter="세탁기">세탁기</button>
                <button class="filter-btn" data-filter="주방가전">주방가전</button>
            </div>
            <div class="gallery-grid" id="gallery-container">
                <!-- Gallery images will be here -->
            </div>
        </div>
    </div>

    <!-- Zoom Modal -->
    <div id="zoom-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="close-zoom" style="color: white; z-index: 1001;">&times;</span>
            <button class="nav-arrow prev-arrow" id="prev-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <img id="zoom-image" src="" alt="Zoom View">
            <button class="nav-arrow next-arrow" id="next-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Download Modal -->
    <div id="download-modal" class="modal-overlay">
        <div class="download-modal-content">
            <span class="close-btn" id="close-download">&times;</span>
            <h3 style="font-size: 1.2rem; font-weight: 700;">매장 이미지 다운로드</h3>
            <p style="color: var(--text-gray); font-size: 0.9rem; margin-top: 0.5rem;">다운로드할 존 이미지를 선택해 주세요.</p>

            <div class="download-filter-grid" id="download-zones">
                <!-- Zones injected via JS -->
            </div>

            <button class="btn-confirm-download" id="confirm-download-btn">다운로드</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="detail_view.js"></script>
</body>

</html>
